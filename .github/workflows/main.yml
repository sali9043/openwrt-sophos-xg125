name: Build OpenWrt Image

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version to build'
        required: true
        default: '25.12.2'
      packages:
        description: 'Extra packages (space-separated)'
        required: false
        default: 'luci kmod-igb kmod-ixgbe openvpn-openssl wireguard-tools kmod-wireguard'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version }}
      TARGET: x86
      SUBTARGET: 64
      PROFILE: generic

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget zstd build-essential libncurses-dev \
            gawk unzip file python3 rsync

      - name: Download Image Builder
        run: |
          IMAGE_BUILDER="openwrt-imagebuilder-${OPENWRT_VERSION}-${TARGET}-${SUBTARGET}.Linux-x86_64"
          wget -q --show-progress \
            "https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET}/${SUBTARGET}/${IMAGE_BUILDER}.tar.zst"
          tar --use-compress-program=unzstd -xf "${IMAGE_BUILDER}.tar.zst"
          echo "IMAGE_BUILDER_DIR=${IMAGE_BUILDER}" >> $GITHUB_ENV

      - name: Verify Image Builder checksum
        run: |
          IMAGE_BUILDER="openwrt-imagebuilder-${OPENWRT_VERSION}-${TARGET}-${SUBTARGET}.Linux-x86_64"
          wget -q "https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET}/${SUBTARGET}/sha256sums"
          grep "${IMAGE_BUILDER}.tar.zst" sha256sums | sha256sum --check

      - name: Build firmware
        run: |
          cd "$IMAGE_BUILDER_DIR"
          make image \
            PROFILE="${PROFILE}" \
            PACKAGES="${{ github.event.inputs.packages }}" \
            2>&1 | tee build.log

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.OPENWRT_VERSION }}-x86-64-${{ github.run_id }}
          path: |
            ${{ env.IMAGE_BUILDER_DIR }}/bin/targets/x86/64/*.img.gz
            ${{ env.IMAGE_BUILDER_DIR }}/bin/targets/x86/64/*.vmdk
            ${{ env.IMAGE_BUILDER_DIR }}/bin/targets/x86/64/sha256sums
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: ${{ env.IMAGE_BUILDER_DIR }}/build.log
