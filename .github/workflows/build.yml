name: Build OpenWrt x86/64 Installer

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt branch or tag (e.g. v25.12.2 or main)'
        required: true
        default: 'v25.12.2'
      packages:
        description: 'Extra packages (space-separated)'
        required: false
        default: 'luci luci-app-openvpn openvpn-openssl wireguard-tools kmod-wireguard kmod-igb kmod-ixgbe'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ← fixes the deprecation warning

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TARGET: x86
      SUBTARGET: 64
      PROFILE: generic

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2  # ← updated

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/lib/jvm
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-distutils python3-setuptools rsync \
            swig unzip zlib1g-dev zstd file wget

      - name: Clone OpenWrt source
        run: |
          git clone --depth 1 --branch ${{ github.event.inputs.openwrt_version }} \
            https://github.com/openwrt/openwrt.git
          cd openwrt
          echo "OPENWRT_DIR=$PWD" >> $GITHUB_ENV

      - name: Update & install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build
        working-directory: openwrt
        run: |
          cat > .config <<'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_ISO_IMAGES=y
          CONFIG_GRUB_IMAGES=y
          CONFIG_GRUB_EFI_IMAGES=y
          CONFIG_GRUB_SERIAL="serial"
          CONFIG_GRUB_BAUDRATE=115200
          CONFIG_GRUB_FLOWCONTROL=n
          CONFIG_TARGET_SERIAL="ttyS0"
          CONFIG_PACKAGE_installcore=y
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_EXT4_RESERVED_PCT=0
          CONFIG_TARGET_EXT4_BLOCKSIZE=4096
          CONFIG_TARGET_KERNEL_PARTSIZE=64
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-app-openvpn=y
          CONFIG_PACKAGE_openvpn-openssl=y
          CONFIG_PACKAGE_wireguard-tools=y
          CONFIG_PACKAGE_kmod-wireguard=y
          CONFIG_PACKAGE_kmod-igb=y
          CONFIG_PACKAGE_kmod-ixgbe=y
          CONFIG_PACKAGE_kmod-nft-nat=y
          CONFIG_PACKAGE_kmod-nft-bridge=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-wireguard=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_curl=y
          EOF
          make defconfig

      - name: Download package sources
        working-directory: openwrt
        run: |
          make download -j$(nproc) V=s 2>&1 | tee download.log
          grep -i "error\|failed" download.log | grep -v "^#" || true

      - name: Build toolchain & firmware
        working-directory: openwrt
        run: |
          make -j$(nproc) V=s 2>&1 | tee build.log || \
          make -j1 V=s 2>&1 | tee build.log

      - name: List output images
        working-directory: openwrt
        run: |
          echo "=== Built images ==="
          ls -lh bin/targets/x86/64/

      - name: Upload installer images
        uses: actions/upload-artifact@v4.6.2  # ← updated
        with:
          name: openwrt-installer-x86-64-${{ github.run_id }}
          path: |
            openwrt/bin/targets/x86/64/*.iso
            openwrt/bin/targets/x86/64/*.img.gz
            openwrt/bin/targets/x86/64/*.vmdk
            openwrt/bin/targets/x86/64/sha256sums
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4.6.2  # ← updated
        with:
          name: build-log-${{ github.run_id }}
          path: |
            openwrt/build.log
            openwrt/download.log
