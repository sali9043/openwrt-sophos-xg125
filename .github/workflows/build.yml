name: Build OpenWrt Image

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Install dependencies
    run: |
      sudo apt update
      sudo apt install -y wget zstd build-essential

  - name: Download Image Builder
    run: |
      wget https://downloads.openwrt.org/releases/25.12.2/targets/x86/64/openwrt-imagebuilder-25.12.2-x86-64.Linux-x86_64.tar.zst
      tar --use-compress-program=unzstd -xvf openwrt-imagebuilder-25.12.2-x86-64.Linux-x86_64.tar.zst

  - name: Build firmware
    run: |
      cd openwrt-imagebuilder*
      make image PROFILE="generic" PACKAGES="luci luci-ssl kmod-igb kmod-ixgbe kmod-e1000e openvpn-openssl luci-app-openvpn wireguard-tools kmod-wireguard luci-app-wireguard luci-app-firewall luci-app-nlbwmon luci-app-statistics adblock luci-app-adblock unbound luci-app-unbound sqm-scripts luci-app-sqm"

  - name: Upload firmware
    uses: actions/upload-artifact@v4
    with:
      name: openwrt-firmware
      path: openwrt-imagebuilder*/bin/targets/x86/64/*
```
